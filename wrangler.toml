name = "edgeiq-license-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
FROM_EMAIL = "licenses@edgeiqlabs.com"
SUPPORT_EMAIL = "support@edgeiqlabs.com"

# Secrets to set via:
# npx wrangler secret put STRIPE_WEBHOOK_SECRET
# npx wrangler secret put RESEND_API_KEY

# KV Namespace for license storage
# Create with: npx wrangler kv:namespace create "LICENSE_KV"
[[kv_namespaces]]
binding = "LICENSE_KV"
id = "YOUR_KV_NAMESPACE_ID"
